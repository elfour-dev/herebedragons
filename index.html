<!DOCTYPE html>
<html>

    <head>
        <meta charset="UTF-8" />
        <title>Here be dragons!</title>
        <style>
            html {
                background: url('clouds.jpg');
                background-size: cover;
                background-attachment: fixed;
                background-color: #3b2d1d;
            }

            img {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
                -webkit-filter: drop-shadow(5px 5px 5px #000);
                filter: drop-shadow(5px 5px 5px #000);
            }
        </style>
    </head>

    <body>
        <img src="crest.png" alt="A dark emblem features a black bat with red eyes, two vintage trains facing forward, and a modern race car, all framed by ornate metallic scrollwork." />
    </body>

</html>
